name: Build MSI Installer

on:
  # Tự động build khi push tag vX.Y.Z
  push:
    tags:
      - "v*.*.*"
  # Cho phép chạy thủ công từ GitHub Actions tab
  workflow_dispatch:

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Đọc version từ pyproject.toml ─────────────────────────────
      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Select-String -Path pyproject.toml -Pattern '^version\s*=\s*"(.+)"').Matches[0].Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      # ── 3. Cài uv ────────────────────────────────────────────────────
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # ── 4. Cài Python + dependencies + PyInstaller ───────────────────
      - name: Install dependencies
        run: uv sync --group dev

      # ── 5. Bundle app bằng PyInstaller ───────────────────────────────
      - name: Build executable (PyInstaller)
        run: |
          uv run pyinstaller `
            --name "point-trace" `
            --windowed `
            --onefile `
            src/point_trace/main.py
          # Output: dist/point-trace.exe (single bundled EXE)

      # ── 6. Cài WiX Toolset v4 (latest) ──────────────────────────────────
      - name: Install WiX Toolset v4
        run: dotnet tool install --global wix --version "4.*"

      # ── 7. Build MSI ─────────────────────────────────────────────────
      - name: Build MSI
        run: |
          wix build installer/point-trace.wxs `
            -d Version=$env:VERSION `
            -o dist/point-trace-$env:VERSION-setup.msi

      # ── 8. Upload artifact (luôn chạy) ───────────────────────────────
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: point-trace-${{ env.VERSION }}-msi
          path: dist/point-trace-${{ env.VERSION }}-setup.msi
          retention-days: 30

      # ── 9. Tạo GitHub Release (chỉ khi push tag) ─────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Point Trace v${{ env.VERSION }}"
          files: dist/point-trace-${{ env.VERSION }}-setup.msi
          generate_release_notes: true
